version: '3'
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: freqtrade_alphaflow
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "8080:8080"
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_btcethsol.log  --db-url sqlite:////freqtrade/user_data/tradesv3_btcethsol.sqlite --config /freqtrade/user_data/config_btcethsol.json --strategy AlphaStrategy
